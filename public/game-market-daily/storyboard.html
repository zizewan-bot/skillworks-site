      html += `<img src="${esc(path)}" alt="${stage}" title="${stage}">`;
    }
    html += '</div>';
  }

  // Scenes
  for (const scene of (a.scenes || [])) {
    const icon = SCENE_ICONS[scene.type] || "▶️";
    html += '<div class="scene-card">';
    html += `<div class="scene-header">${icon} ${esc(scene.time)} ${esc(scene.type)}</div>`;
    html += `<div class="scene-desc">${esc(scene.description)}</div>`;
    html += '</div>';
  }

  // Creative insight
  if (a.creative_insight) {
    html += '<div class="insight-box">';
    html += '<div class="insight-label">💡 创意洞察</div>';
    html += `<div class="insight-text">${esc(a.creative_insight)}</div>`;
    html += '</div>';
  }

  html += `<a class="meta-link" href="${metaLink}" target="_blank">📺 在 Meta Ad Library 查看完整素材 →</a>`;
  html += '</div>';
  container.innerHTML += html;
});

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
